name: ML Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Linter
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics


  train:
    needs: linter
    runs-on: ubuntu-latest
    if: success() && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[run-train]')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install dvc

      - name: Configure DVC remote
        run: |
          dvc remote add origin ${{ secrets.DVC_REMOTE_URL }} --force
          dvc remote modify origin auth basic
          dvc remote modify origin user ${{ secrets.DVC_USERNAME }}
          dvc remote modify origin password ${{ secrets.DVC_PASSWORD }}

      - name: Pull data with DVC
        run: dvc pull

      - name: Train model
        run: python train.py 2> error_logs.txt || (cat error_logs.txt && exit 1)
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

      - name: Verify model info
        run: |
          echo "Files in current directory:"
          ls -la
          cat model_info.txt

      - name: Upload model info
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

      - name: Upload Logs on Failure
        if: failure() 
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      - name: Cloud Volume Cleanup
        if: always() 
        run: echo "Cleaning up temporary cloud volumes..."


  deploy:
    runs-on: ubuntu-latest
    needs: train 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install mlflow

      - name: Download model info
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Check accuracy threshold
        run: python check_threshold.py
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

      - name: Mock Docker Build
        run: echo "Building Docker image for Run ID $(cat model_info.txt)"